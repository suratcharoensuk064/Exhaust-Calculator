<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Lambda Fix</title>

<script>
window.MathJax = {
tex: { inlineMath: [['\\(','\\)'], ['$', '$']] },
svg: { fontCache: 'global' }
};
</script>

<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>

<style>
body{
font-family:Segoe UI;
background:#f4f6f9;
padding:20px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
max-width:600px;
margin:auto;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

input{
padding:8px;
width:100%;
}

button{
margin-top:10px;
padding:10px;
width:100%;
background:#2f80ed;
color:white;
border:none;
}

.result{
margin-top:15px;
font-weight:bold;
color:#2f80ed;
}

.formula{
background:#f9fafc;
padding:10px;
margin-bottom:10px;
border-radius:6px;
}
</style>
</head>

<body>

<div class="card">

<h2>Lambda Calculator</h2>

<div class="formula">
\[
\lambda =
\frac{
CO_2+\frac{CO}{2}+O_2+\frac{NO}{2}
+
\left(
\frac{H_{cv}}{4}
\frac{3.5}{3.5+\frac{CO}{CO_2}}
-
\frac{O_{cv}}{2}
\right)(CO_2+CO)
}{
\left(
1+\frac{H_{cv}}{4}-\frac{O_{cv}}{2}
\right)(CO_2+CO+6HC)
}
\]
</div>

<div class="grid">
<input id="co2" placeholder="CO2 (%)">
<input id="co" placeholder="CO (%)">
<input id="o2" placeholder="O2 (%)">
<input id="hc" placeholder="HC (ppm)">
<input id="nox" placeholder="NOx (ppm)">
<input id="hcv" placeholder="Hcv">
<input id="ocv" placeholder="Ocv">
</div>

<button id="btnLambda">Calculate</button>

<div class="result" id="lambda_out">λ = -</div>

</div>

<script>

document.addEventListener("DOMContentLoaded", function(){

// ===== force MathJax render =====
if(window.MathJax){
MathJax.typesetPromise();
}

// ===== bind button =====
document.getElementById("btnLambda").addEventListener("click", function(){

try{

let co2 = parseFloat(document.getElementById("co2").value);
let co  = parseFloat(document.getElementById("co").value);
let o2  = parseFloat(document.getElementById("o2").value);
let hc  = parseFloat(document.getElementById("hc").value)/10000;
let no  = parseFloat(document.getElementById("nox").value)/10000;
let hcv = parseFloat(document.getElementById("hcv").value);
let ocv = parseFloat(document.getElementById("ocv").value);

// ===== validate =====
if([co2,co,o2,hc,no,hcv,ocv].some(v=>isNaN(v))){
alert("กรอกค่าให้ครบ");
return;
}

if(co2 === 0){
alert("CO2 ห้ามเป็น 0");
return;
}

// ===== calc =====
let term =
((hcv/4)*(3.5/(3.5+(co/co2))) - (ocv/2));

let numerator =
co2 + co/2 + o2 + no/2 + term*(co2+co);

let denominator =
(1 + hcv/4 - ocv/2)*(co2 + co + 6*hc);

if(denominator === 0){
alert("หาร 0");
return;
}

let lambda = numerator / denominator;

// ===== show =====
document.getElementById("lambda_out").innerText =
"λ = " + lambda.toFixed(4);

}catch(e){
console.error(e);
alert("Error ใน Lambda");
}

});

});

</script>

</body>
</html>
