<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Exhaust Calculator</title>
<style>
body{font-family:Arial;padding:20px}
.section{border:1px solid #ccc;padding:15px;margin-bottom:15px}
input{display:block;margin:5px 0;padding:5px;width:200px}
button{margin-top:5px;padding:6px 12px}
.result{margin-top:5px;font-weight:bold}
</style>
</head>
<body>

<h1>Exhaust Calculator</h1>

<!-- 1 Fuel Flow -->
<div class="section">
<h3>1. Fuel Flow</h3>
<input id="fuel_lpm" placeholder="Fuel (LPM)">
<button onclick="calcFuel()">Calculate</button>
<div id="fuel_result" class="result"></div>
</div>

<!-- 2 Lambda -->
<div class="section">
<h3>2. Lambda</h3>
<input id="co2" placeholder="CO2 (%)">
<input id="o2" placeholder="O2 (%)">
<button onclick="calcLambda()">Calculate</button>
<div id="lambda_result" class="result"></div>
</div>

<!-- 3 Density -->
<div class="section">
<h3>3. Density</h3>
<input id="P" placeholder="Pressure (Pa)">
<input id="T" placeholder="Temp (°C)">
<button onclick="calcDensity()">Calculate</button>
<div id="density_result" class="result"></div>
</div>

<!-- 4 A0 -->
<div class="section">
<h3>4. A0</h3>
<input id="C" placeholder="C">
<input id="H" placeholder="H">
<input id="O" placeholder="O">
<button onclick="calcA0()">Calculate</button>
<div id="a0_result" class="result"></div>
</div>

<!-- 5 G' -->
<div class="section">
<h3>5. G'</h3>
<input id="Gdry" placeholder="Gdry">
<input id="lambda_g" placeholder="Lambda">
<button onclick="calcG()">Calculate</button>
<div id="g_result" class="result"></div>
</div>

<!-- 6 Vstd -->
<div class="section">
<h3>6. Vstd</h3>
<input id="Gprime" placeholder="G'">
<input id="mfuel" placeholder="mfuel (kg/s)">
<button onclick="calcVstd()">Calculate</button>
<div id="vstd_result" class="result"></div>
</div>

<!-- 7 Vactual -->
<div class="section">
<h3>7. Vactual</h3>
<input id="Vstd" placeholder="Vstd">
<input id="Tact" placeholder="Tactual (°C)">
<button onclick="calcVactual()">Calculate</button>
<div id="vactual_result" class="result"></div>
</div>

<!-- 8 Exhaust Flow -->
<div class="section">
<h3>8. Exhaust Flow</h3>
<input id="Vact2" placeholder="Vactual">
<input id="rho" placeholder="Density">
<button onclick="calcExhaust()">Calculate</button>
<div id="exhaust_result" class="result"></div>
</div>

<script>

function calcFuel(){
let v=document.getElementById("fuel_lpm").value
if(v===""){return}
let result=parseFloat(v)/60
document.getElementById("fuel_result").innerHTML=result.toFixed(6)+" kg/s"
}

function calcLambda(){
let co2=document.getElementById("co2").value
let o2=document.getElementById("o2").value
if(co2===""||o2===""){return}
let result=1+(parseFloat(o2)/21)
document.getElementById("lambda_result").innerHTML=result.toFixed(4)
}

function calcDensity(){
let P=document.getElementById("P").value
let T=document.getElementById("T").value
if(P===""||T===""){return}
let R=287
let Tk=parseFloat(T)+273.15
let result=parseFloat(P)/(R*Tk)
document.getElementById("density_result").innerHTML=result.toFixed(4)
}

function calcA0(){
let C=document.getElementById("C").value
let H=document.getElementById("H").value
let O=document.getElementById("O").value
if(C===""||H===""||O===""){return}
let result=C+(H/4)-(O/8)
document.getElementById("a0_result").innerHTML=result.toFixed(4)
}

function calcG(){
let G=document.getElementById("Gdry").value
let L=document.getElementById("lambda_g").value
if(G===""||L===""){return}
let result=parseFloat(G)*parseFloat(L)
document.getElementById("g_result").innerHTML=result.toFixed(4)
}

function calcVstd(){
let G=document.getElementById("Gprime").value
let mf=document.getElementById("mfuel").value
if(G===""||mf===""){return}
let result=parseFloat(G)*parseFloat(mf)
document.getElementById("vstd_result").innerHTML=result.toFixed(4)
}

function calcVactual(){
let V=document.getElementById("Vstd").value
let T=document.getElementById("Tact").value
if(V===""||T===""){return}
let result=parseFloat(V)*((parseFloat(T)+273.15)/273.15)
document.getElementById("vactual_result").innerHTML=result.toFixed(4)
}

function calcExhaust(){
let V=document.getElementById("Vact2").value
let rho=document.getElementById("rho").value
if(V===""||rho===""){return}
let result=parseFloat(V)*parseFloat(rho)
document.getElementById("exhaust_result").innerHTML=result.toFixed(4)+" kg/s"
}

</script>

</body>
</html>
