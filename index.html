<!DOCTYPE html>
<html>
<head>
<title>Exhaust Gas Calculator</title>
<style>
body{
font-family: Arial;
margin:40px;
background:#f5f5f5;
}

.container{
background:white;
padding:20px;
margin-bottom:30px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

input{
padding:5px;
margin:5px;
}

button{
padding:8px 15px;
margin-top:10px;
}
</style>
</head>

<body>

<h1>Engine Exhaust Calculator</h1>

<!-- LAMBDA -->

<div class="container">

<h2>Lambda Calculator</h2>

CO2 (%) <input id="co2"><br>
CO (%) <input id="co"><br>
O2 (%) <input id="o2"><br>
NO (%) <input id="no"><br>
HC (ppm) <input id="hc"><br>

<button onclick="lambda()">Calculate Lambda</button>

<h3 id="lambda_result"></h3>

</div>

<!-- DENSITY -->

<div class="container">

<h2>Exhaust Density</h2>

Pressure P (kPa) <input id="P"><br>
Temperature T (K) <input id="T"><br>
Molecular Weight M (kg/kmol) <input id="M"><br>

<button onclick="density()">Calculate Density</button>

<h3 id="density_result"></h3>

</div>

<!-- FUEL MASS FLOW -->

<div class="container">

<h2>Fuel Mass Flow</h2>

Volume Flow Vfuel (L/min) <input id="Vfuel"><br>
Fuel Density ρfuel (kg/L) <input id="rhofuel"><br>

<button onclick="mfuel()">Calculate mfuel</button>

<h3 id="mfuel_result"></h3>

</div>


<script>

function lambda(){

let CO2=parseFloat(document.getElementById("co2").value)
let CO=parseFloat(document.getElementById("co").value)
let O2=parseFloat(document.getElementById("o2").value)
let NO=parseFloat(document.getElementById("no").value)
let HC=parseFloat(document.getElementById("hc").value)/10000

let Hcv=1.83
let Ocv=0
let n=6

let numerator =
CO2 + CO/2 + O2 + NO/2 +
((Hcv/4)*(3.5/(3.5 + CO/CO2)) - (Ocv/2))

let denominator =
(1 + Hcv/4 - Ocv/2)*(CO2 + CO + n*HC)

let lambda = numerator / denominator

document.getElementById("lambda_result").innerHTML =
"Lambda = " + lambda.toFixed(3)

}

function density(){

let P = parseFloat(document.getElementById("P").value) * 1000
let T = parseFloat(document.getElementById("T").value)
let M = parseFloat(document.getElementById("M").value)

let R = 8.314

let rho = (P*M)/(R*T)

document.getElementById("density_result").innerHTML =
"Density = " + rho.toFixed(3) + " kg/m³"

}

function mfuel(){

let V=parseFloat(document.getElementById("Vfuel").value)
let rho=parseFloat(document.getElementById("rhofuel").value)

let m=rho*V

document.getElementById("mfuel_result").innerHTML =
"mfuel = " + m.toFixed(3) + " kg/min"

}

</script>

</body>
</html>
