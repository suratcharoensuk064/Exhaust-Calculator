<!DOCTYPE html>
<html>

<head>
<title>Gas Density Calculator</title>

<style>

body{
font-family: Arial;
background:#f4f6f8;
text-align:center;
margin-top:80px;
}

.container{
background:white;
padding:40px;
width:350px;
margin:auto;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

input{
width:80%;
padding:8px;
margin:8px;
font-size:16px;
}

button{
padding:10px 20px;
font-size:16px;
background:#2c7be5;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

#result{
margin-top:20px;
font-size:20px;
font-weight:bold;
}

</style>

</head>

<body>

<div class="container">

<h2>Gas Density Calculator</h2>

Pressure P (Pa)<br>
<input id="pressure"><br>

Molecular Weight M (kg/mol)<br>
<input id="molecular"><br>

Temperature T (°C)<br>
<input id="temp"><br><br>

<button onclick="calc()">Calculate</button>

<p id="result"></p>

</div>

<script>

function calc(){

let P = Number(document.getElementById("pressure").value)
let M = Number(document.getElementById("molecular").value)
let T = Number(document.getElementById("temp").value) + 273.15

let R = 8.314

let rho = (P * M) / (R * T)

document.getElementById("result").innerHTML =
"Density = " + rho.toFixed(4) + " kg/m<sup>3</sup>"

}

</script>

</body>
</html>
