<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Exhaust Gas Calculator</title>

<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

<style>
body{
font-family:Segoe UI;
background:#eef2f7;
margin:0;
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

h1{
text-align:center;
margin-bottom:30px;
}

.card{
background:white;
padding:20px;
margin-bottom:20px;
border-radius:12px;
box-shadow:0 3px 10px rgba(0,0,0,0.08);
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

label{
font-size:14px;
color:#333;
}

input{
width:100%;
padding:7px;
border:1px solid #ccc;
border-radius:6px;
}

button{
margin-top:10px;
padding:10px;
width:100%;
background:#2f80ed;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

.result{
margin-top:10px;
font-weight:bold;
color:#2f80ed;
}
</style>
</head>

<body>

<div class="container">
<h1>Exhaust Gas Calculator</h1>

<!-- Fuel -->
<div class="card">
<h3>Fuel Flow</h3>

\[
\dot{m}_{fuel}=\frac{\dot{V}_{fuel}\rho_{fuel}}{60\times10^6}
\]

<div class="grid">
<div>
<label>Fuel Flow (ml/min)</label>
<input id="vfuel">
</div>

<div>
<label>Density (kg/L)</label>
<input id="rho">
</div>
</div>

<button onclick="calcFuel()">Calculate</button>
<p class="result" id="mfuel"></p>
</div>

<!-- Lambda -->
<div class="card">
<h3>Lambda</h3>

<div class="grid">
<input placeholder="CO2 %" id="co2">
<input placeholder="CO %" id="co">
<input placeholder="O2 %" id="o2">
<input placeholder="HC ppm" id="hc">
<input placeholder="NOx ppm" id="nox">
<input placeholder="Hcv" id="hcv">
<input placeholder="Ocv" id="ocv">
</div>

<button onclick="calcLambda()">Calculate</button>
<p class="result" id="lambda"></p>
</div>

</div>

<script>

// ===== Fuel =====
function calcFuel(){
let V=Number(vfuel.value)
let rho=Number(document.getElementById("rho").value)

let mf=(V*rho)/(60*1e6)

document.getElementById("mfuel").innerText =
"ṁfuel = "+mf.toExponential(6)+" kg/s"
}

// ===== Lambda =====
function calcLambda(){

let co2=Number(co2.value)
let co=Number(co.value)
let o2=Number(o2.value)
let hc=Number(hc.value)/10000
let no=Number(nox.value)/10000
let hcv=Number(hcv.value)
let ocv=Number(ocv.value)

if([co2,co,o2,hc,no,hcv,ocv].some(v=>isNaN(v))){
alert("กรอกค่าให้ครบ")
return
}

let numerator=
co2 + co/2 + o2 + no/2 +
((hcv/4)*(3.5/(3.5+(co/co2))) - ocv/2)*(co2+co)

let denominator=
(1 + hcv/4 - ocv/2)*(co2 + co + 6*hc)

let lambda=numerator/denominator

document.getElementById("lambda").innerText =
"λ = "+lambda.toFixed(4)
}

</script>

</body>
</html>
